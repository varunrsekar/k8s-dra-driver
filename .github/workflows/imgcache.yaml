name: cache-layers-to-ghcr

on:
  workflow_call:

jobs:
  cache-layers-to-ghcr:
    runs-on: linux-arm64-cpu8
    steps:
      - uses: actions/checkout@v6
        name: checkout
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v10.0.4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          buildkitd-config: /etc/buildkit/buildkitd.toml
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: push-build-layers-to-ghcr
        env:
          IMAGE_NAME: ghcr.io/nvidia/k8s-dra-driver-gpu
          BUILD_MULTI_ARCH_IMAGES: "true"
          CACHE_FROM_GHCR: "true"
          CACHE_TO_GHCR: "true"
          PUSH_ON_BUILD: "false"
        run: |
          # Perform a build, but do not push regular image to registry. Push all
          # intermediate layers to GHCR (CACHE_TO_GHCR: true).
          export IMAGE_TAG="$(echo $GITHUB_SHA | cut -c1-8)"
          make -f deployments/container/Makefile build
