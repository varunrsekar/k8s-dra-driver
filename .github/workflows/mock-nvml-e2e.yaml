# GPU e2e tests using mock NVML on a CPU-only runner.
# Emulates 8x GB200 NVL GPUs via mock NVML from nvidia/k8s-test-infra, creates
# a Kind cluster with DRA, and runs the BATS test suite.
# Complements the Lambda Cloud GPU tests (Prow) with fast, cheap CPU-only coverage.
name: Mock NVML E2E

on:
  pull_request:
    branches: [main, release-*]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'pkg/**'
      - 'deployments/**'
      - 'tests/**'
      - 'hack/ci/mock-nvml/**'
      - '.github/workflows/mock-nvml-e2e.yaml'
      - 'go.mod'
      - 'go.sum'
  push:
    branches: [main]

jobs:
  mock-gpu-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      KIND_CLUSTER_NAME: mock-nvml-test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          repository: NVIDIA/k8s-test-infra
          path: _k8s-test-infra
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version-file: go.mod
      - name: Workaround flaky apt mirrors in NVIDIA base image
        run: |
          # amd64 uses archive.ubuntu.com, arm64 uses ports.ubuntu.com/ubuntu-ports.
          # Replace both with Azure-hosted mirrors (reliable from GHA Azure runners).
          sed -i '/^RUN apt-get update/i RUN sed -i -e "s|http://archive.ubuntu.com|http://azure.archive.ubuntu.com|g" -e "s|http://security.ubuntu.com|http://azure.archive.ubuntu.com|g" -e "s|http://ports.ubuntu.com|http://azure.ports.ubuntu.com|g" /etc/apt/sources.list || true' \
            deployments/container/Dockerfile
      - name: Run mock NVML GPU e2e tests
        run: hack/ci/mock-nvml/e2e-test.sh
        env:
          K8S_TEST_INFRA_DIR: ${{ github.workspace }}/_k8s-test-infra
          GPU_PROFILE: gb200
          GPU_COUNT: "8"
      - name: Export Kind logs
        if: always()
        run: |
          mkdir -p /tmp/mock-nvml-artifacts/kind-logs
          kind export logs /tmp/mock-nvml-artifacts/kind-logs --name "$KIND_CLUSTER_NAME" || true
      - name: Collect debug artifacts
        if: failure()
        run: |
          mkdir -p /tmp/mock-nvml-artifacts
          kubectl get all -A -o wide > /tmp/mock-nvml-artifacts/all-resources.txt 2>&1 || true
          kubectl get events -A --sort-by='.lastTimestamp' > /tmp/mock-nvml-artifacts/all-events.txt 2>&1 || true
          kubectl cluster-info dump --all-namespaces --output-directory=/tmp/mock-nvml-artifacts/cluster-dump 2>/dev/null || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mock-nvml-e2e-debug
          path: /tmp/mock-nvml-artifacts/
          retention-days: 7
