# Bats GPU/integration tests are not run in GitHub Actions. They will be configured in kubernetes/test-infra (Prow).
name: tests

on:
  workflow_dispatch:

jobs:
  skipped:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Bats run on Prow
        run: |
          echo "Bats suites (make bats) are executed from Prow against the test GPU cluster."
