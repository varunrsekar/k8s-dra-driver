# Multi-arch image build only (OCI tarball). No docker login and no push — Prow owns registry pushes.
name: image

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        name: Check out code

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v10.0.4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      # TODO: This will be moved to Prow where image publishing is configured and credentials are available.
      # For now, we want to test multi-arch builds in GitHub Actions as well, but without pushing to the registry.
      - name: Multi-arch build
        env:
          IMAGE_NAME: registry.k8s.io/dra-driver-nvidia/dra-driver-nvidia-gpu
          BUILD_MULTI_ARCH_IMAGES: "true"
          BUILD_MULTI_ARCH_GH: "true"
          CI: "true"
        run: |
          make print-VERSION
          export IMAGE_TAG="$(make print-VERSION)-$(echo $GITHUB_SHA | cut -c1-8)"
          make -f deployments/container/Makefile build
          ls -la dist/
