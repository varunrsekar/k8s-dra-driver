baseURL = "https://dra-driver-nvidia-gpu.sigs.k8s.io/"
title = "DRA Driver for NVIDIA GPUs"
defaultContentLanguage = "en"
enableRobotsTXT = true
enableGitInfo = true

[languages]
  [languages.en]
    locale = "en-us"
    label = "English"
    contentDir = "content"
    weight = 1

# Hugo module (Docsy) configuration
[module]
  proxy = "direct"
  [module.hugoVersion]
    extended = true
    min = "0.157.0"
  [[module.imports]]
    path = "github.com/google/docsy"
    disable = false
  [[module.imports]]
    path = "github.com/google/docsy/dependencies"
    disable = false

# Markup
[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    style = "tango"
    lineNos = false
    noClasses = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# Top navigation bar
[[menu.main]]
  name = "Docs"
  weight = 10
  url = "/docs/"
[[menu.main]]
  name = "Contribute"
  weight = 20
  url = "/contribute/"
[[menu.main]]
  name = "GitHub"
  weight = 30
  url = "https://github.com/kubernetes-sigs/dra-driver-nvidia-gpu"
  pre = "<i class='fab fa-github'></i>"

# Site-wide parameters
[params]
  copyright = "The Kubernetes Authors"
  github_repo = "https://github.com/kubernetes-sigs/dra-driver-nvidia-gpu"
  github_branch = "main"
  github_subdir = "site"
  github_project_repo = "https://github.com/kubernetes-sigs/dra-driver-nvidia-gpu"
  offlineSearch = false
  prism_syntax_highlighting = false

  [params.taxonomy]
    taxonomyCloud = []
    taxonomyPageHeader = []

  [params.mermaid]
    enable = true

  [params.ui]
    breadcrumb_disable = false
    navbar_logo = true
    navbar_translucent_over_cover_disable = false
    readingtime.enable = false
    sidebar_menu_compact = true
    sidebar_menu_foldable = true
    # Search hidden until Algolia DocSearch is approved + configured.
    # Flip to false once [params.search.algolia] is populated below.
    sidebar_search_disable = true

    [params.ui.feedback]
      enable = false

  # Algolia DocSearch — uncomment and populate after the OSS application
  # is approved. Also flip params.ui.sidebar_search_disable to false above.
  # [params.search.algolia]
  #   appId = ""
  #   apiKey = ""
  #   indexName = ""

  [params.links]
    [[params.links.user]]
      name = "Kubernetes Slack #sig-node"
      url = "https://kubernetes.slack.com/messages/sig-node"
      icon = "fab fa-slack"
      desc = "Discussion and questions on Kubernetes SIG Node"
    [[params.links.developer]]
      name = "GitHub"
      url = "https://github.com/kubernetes-sigs/dra-driver-nvidia-gpu"
      icon = "fab fa-github"
      desc = "Source code and issue tracker"

# Output formats — required for Docsy search & sitemaps
[outputs]
  home = ["HTML", "RSS", "SITEMAP"]
  section = ["HTML", "RSS"]

[outputFormats]
  [outputFormats.SITEMAP]
    mediaType = "application/xml"
    baseName = "sitemap"
    isHTML = false
    isPlainText = true
    rel = "sitemap"