apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: rct-cel-nomatch
  labels:
    env: batssuite
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.nvidia.com
          selectors:
          - cel:
              expression: 'device.attributes["gpu.nvidia.com"].productName == "NONEXISTENT-GPU-XYZ"'
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-cel-nomatch
  labels:
    env: batssuite
spec:
  containers:
  - name: ctr
    image: ubuntu:24.04
    command: ["nvidia-smi", "-L"]
    resources:
      claims:
      - name: gpu
  resourceClaims:
  - name: gpu
    resourceClaimTemplateName: rct-cel-nomatch
