apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: rct-deploy-gpu
  labels:
    env: batssuite
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.nvidia.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-deploy-parallel
  labels:
    env: batssuite
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gpu-deploy-parallel
  template:
    metadata:
      labels:
        app: gpu-deploy-parallel
        env: batssuite
    spec:
      containers:
      - name: worker
        image: ubuntu:24.04
        command: ["bash", "-c"]
        args: ["nvidia-smi -L; trap 'exit 0' TERM; sleep 9999 & wait"]
        resources:
          claims:
          - name: gpu
      resourceClaims:
      - name: gpu
        resourceClaimTemplateName: rct-deploy-gpu
