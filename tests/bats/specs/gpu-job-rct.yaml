apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: rct-job-gpu
  labels:
    env: batssuite
spec:
  spec:
    devices:
      requests:
      - name: gpu
        exactly:
          deviceClassName: gpu.nvidia.com
---
apiVersion: batch/v1
kind: Job
metadata:
  name: gpu-job-rct
  labels:
    env: batssuite
spec:
  completions: 2
  parallelism: 1
  template:
    metadata:
      labels:
        env: batssuite
    spec:
      restartPolicy: Never
      containers:
      - name: worker
        image: ubuntu:24.04
        command: ["bash", "-c"]
        args: ["nvidia-smi -L && echo 'GPU Job completed successfully'"]
        resources:
          claims:
          - name: gpu
      resourceClaims:
      - name: gpu
        resourceClaimTemplateName: rct-job-gpu
