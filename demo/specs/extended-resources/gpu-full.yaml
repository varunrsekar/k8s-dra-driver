# Full GPU via Extended Resource
#
# The Helm chart ships the gpu.nvidia.com DeviceClass with
# extendedResourceName: nvidia.com/gpu already set. No additional
# DeviceClass is needed for full-GPU access.
#
# Prerequisites:
#   - Kubernetes >= 1.35 with feature gate DRAExtendedResource=true
#   - NVIDIA device plugin for Kubernetes is not installed or disabled
#   - DRA Driver for NVIDIA GPUs installed via Helm
#
# Verify after apply:
#   kubectl get resourceclaims -n extended-resource-gpu-full
#   kubectl get pod gpu-full-pod -n extended-resource-gpu-full \
#     -o jsonpath='{.status.extendedResourceClaimStatus}' | jq .
#
# What happens behind the scenes:
#   The pod spec below contains NO resourceClaims block. When the scheduler
#   sees nvidia.com/gpu in resources.limits, it matches it to the
#   gpu.nvidia.com DeviceClass (via extendedResourceName) and auto-generates
#   a ResourceClaim. The expected auto-generated ResourceClaim and pod status
#   are shown at the bottom of this file.

---
apiVersion: v1
kind: Namespace
metadata:
  name: extended-resource-gpu-full

---
apiVersion: v1
kind: Pod
metadata:
  namespace: extended-resource-gpu-full
  name: gpu-full-pod
spec:
  restartPolicy: Never
  containers:
  - name: cuda-container
    image: nvcr.io/nvidia/k8s/cuda-sample:vectoradd-cuda12.5.0
    resources:
      limits:
        nvidia.com/gpu: 1
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

# --- Auto-generated by the scheduler (not user-created) ---
#
# The scheduler creates a ResourceClaim like the one below during PreBind.
# Use `kubectl get resourceclaim -n extended-resource-gpu-full -o yaml`
# to inspect it after the pod is scheduled.
#
# apiVersion: resource.k8s.io/v1
# kind: ResourceClaim
# metadata:
#   annotations:
#     resource.kubernetes.io/extended-resource-claim: "true"
#   generateName: gpu-full-pod-extended-resources-
#   name: gpu-full-pod-extended-resources-x7k9m    # suffix is random
#   namespace: extended-resource-gpu-full
#   ownerReferences:
#   - apiVersion: v1
#     controller: true
#     kind: Pod
#     name: gpu-full-pod
# spec:
#   devices:
#     requests:
#     - name: container-0-request-0                 # <container-idx>-request-<resource-idx>
#       exactly:
#         allocationMode: ExactCount
#         count: 1
#         deviceClassName: gpu.nvidia.com
# status:
#   allocation:
#     devices:
#       results:
#       - device: gpu-0                             # from ResourceSlice
#         driver: gpu.nvidia.com
#         pool: worker-node-1                        # node name
#         request: container-0-request-0
#
# The pod status will also contain:
#
# status:
#   extendedResourceClaimStatus:
#     resourceClaimName: gpu-full-pod-extended-resources-x7k9m
#     requestMappings:
#     - containerName: cuda-container
#       requestName: container-0-request-0
#       resourceName: nvidia.com/gpu
